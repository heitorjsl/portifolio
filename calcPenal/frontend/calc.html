<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Penal-Cespedes Lourenço </title>
    <link rel="icon" type="image/png" href="arquivos/logo.ico">
</head>

<body>
    <header>
        <a href="telaInicial.html"><img src="arquivos/logo.png" alt="Cespedes Lourenço advogados" id="logoHeader"></a>
        <nav class="menu">
            <button class="menu-botao" aria-label="abrir-menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="menu-itens">
                <li><a href="contato.html">Contato</a></li>
                <li><a href="projeto.html">Conheça o projeto</a></li>
            </ul>
        </nav>
    </header>
    <h1 class="tituloCalc">Calculadora Penal
        <p class="subtituloCalc">Insira os dados para calcular a pena </p>
    </h1>
    <main>
        <div class="formCalc-container">
            <div class="formCalc">
                <label for="tipoCrime">
                    <p> Tipo de Crime: </p>
                    <select id="tipoCrime">
                        <option value="não hediondo">Não hediondo</option>
                        <option value="hediondo">Hediondo</option>
                        <option value="equiparado">Equiparado</option>
                    </select>
                </label>
                <label for="statusApenado">
                    </p>Reincidência:<p>
                        <select id="statusApenado">
                            <option value="primario">Primário</option>
                            <option value="reincidente">Reincidente</option>
                        </select>
                </label>
                <label for="dataInicio">
                    <p>Data de início da pena:</p>
                    <input type="date" id="dataInicio">
                </label>
            </div>
            <div class="formCalc">
                <label for="penaAnos">
                    <p>Pena em anos:</p>
                    <input type="text" id="penaAnos" autocomplete="off" maxlength="2" value="0" oninput="limitarInput()">
                </label>
                <label for="penaMeses">
                    <p>Pena em meses:</p>
                    <input type="text" id="penaMeses" value="0" maxlength="2" oninput="limitarInput()" autocomplete="off">
                </label>
                <label for="penaDias">
                    <p>Pena em dias:</p>
                    <input type="text" id="penaDias" autocomplete="off" value="0" maxlength="2" oninput="limitarInput()">
                </label>
            </div>
            <div class="formCalc">
                <label for="detracaoDias">
                    <p>Detração em dias:</p>
                    <input type="text" id="detracaoDias" min="0" value="0" maxlength="4" autocomplete="off" oninput="limitarInput()">
                </label>
                <button id="btnCalcular">Calcular pena</button>
            </div>
        </div>

        <div id="resultado-container">
        </div>
    </main>
    <script src=menu.js></script>
    <script src="calc.js" defer></script>
    <script src="limitar.js"></script>
</body>

</html>
